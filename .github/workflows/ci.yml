name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore AadharLocation.slnx

      - name: Build
        run: dotnet build AadharLocation.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test AadharLocation.slnx --no-build --configuration Release --logger trx

      - name: Install EF tools
        run: dotnet tool install --global dotnet-ef

      - name: Validate migrations (no DB connection needed)
        run: dotnet ef migrations list --project src/AadharLocation.Api --no-connect

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: "**/*.trx"
